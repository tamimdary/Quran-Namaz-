<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>নূরের পথ - আলোর পথে চলো</title>
    <!-- PWA Meta tags -->
    <meta name="theme-color" content="#0D1B2A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="নূরের পথ" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- html2canvas for certificate generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYgYiSWqcECyE643YHO99qPfDnsmGNi88G7CUXV4RntL5O58P6P/jY1FfmxG3o6XJkRHe80x+1X58vX6w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg))
            .catch(err => console.log('Service Worker registration failed.', err));
        });
      }
    </script>
  </body>
</html>
